# =============================================================================
# policy_v1.yaml — Policy-as-code для mcp-gatekeeper (привратник портов/таймеров)
# -----------------------------------------------------------------------------
# Это единственный источник истины для PDP-мозга сервера. БЕЗ LLM в ядре:
# детерминированные правила. Любое изменение политики — через этот файл
# (и перезапуск юнита). Версия политики = 1 (v1, точный match).
#
# Контракт: docs/CONTRACT.md
# =============================================================================

version: 1

gatekeeper:
  # Собственный адрес прослушивания MCP (НЕ в пуле агентов 8080-8199,
  # чтобы не конфликтовать с выдаваемыми портами).
  listen_host: "127.0.0.1"
  listen_port: 8888

  # Глобальный разрешённый диапазон портов лаборатории (ADR-0047 P4).
  # НЕ разбивается по агентам — любой агент/инфра может брать любой порт
  # в диапазоне по назначению (API 8000-8099, вспомогательные 8100-8199,
  # метрики 9000-9099). Главное — не резерв и не коллизия. Резерв и
  # коллизии — зона reserve-проверки и ядра ОС, а не per-agent пула
  # (уточнение ЗавЛаба 12.07: порты делятся по назначению, не по агентам).
  allowed_port_range: [1024, 65535]

  # Lease: аренда ресурса агентом. Если heartbeat не приходит за lease_timeout_sec,
  # ресурс автоматически освобождается (lease-таймаут -> освобождение).
  lease_timeout_sec: 300
  # Ожидаемый интервал heartbeat (для диагностики/логов).
  heartbeat_interval_sec: 60

  # Least-privilege: ресурсы выдаются «от имени» этого ограниченного юзера.
  # Это НЕ root. Если здесь указан root — сервер напишет предупреждение в лог.
  lease_user: "mcp-gatekeeper"

  # Root backdoor: root обходит проверки PDP, но аудируется как BYPASS=root.
  # Выключите (false), чтобы запретить обход полностью.
  allow_root_backdoor: true

  # Root backdoor: кто авторизован делать as_root-обход (Фаза 2, ADR-0055).
  # sh — легитимный инфра-вызыватель (systemctl restart от админа/ЗавЛаба).
  authorized_root_agents: [raven, antcat, dominika, kotolizator, mangust, owl, bestia, streikbrecher, sh]

  # Justification mode:
  #   v1_exact  — what_for обязателен + точный (exact) match для дедупа оправданий.
  #   v2_semantic — то же + семантический дедуп через лаб. семпамять (fail-open:
  #                если эмбеддер недоступен, не блокируем, пишем warn).
  justification_mode: "v1_exact"

  # Log rate-limit: защита диска от шквала логов (сообщений/сек).
  log_rate_limit_per_sec: 20
  fact_capture_interval_sec: 300

# -----------------------------------------------------------------------------
# Агенты и их пулы портов. Identity-шаг проверяет, что agent.id известен.
# Диапазон портов — шаг 2 PDP. Порядок не важен.
# -----------------------------------------------------------------------------
agents:
  - id: raven          # Ворон
    name: "Ворон"
  - id: sh             # Системный shim/инфра (wrapper, systemd-restart от имени инфры)
    name: "Shim/System"
  - id: antcat         # Муравей
    name: "Муравей"
  - id: owl            # Сова
    name: "Сова"
  - id: kotolizator    # Кот
    name: "КотОлизатор"
  - id: mangust        # Мангуст
    name: "Мангуст"
  - id: bestia         # Бестия
    name: "Бестия"
  - id: dominika       # Доминика
    name: "Доминика"
  - id: streikbrecher  # Штрейкбрехер
    name: "Штрейкбрехер"

# -----------------------------------------------------------------------------
# Квоты (шаг 3 PDP): лимиты на агента.
# -----------------------------------------------------------------------------
quotas:
  # max_ports поднят 3 -> 30 (Уровень 1-Г follow-up, решение ЗавЛаба 14.07):
  # квота считает число различных порт-lease агента, активных одновременно
  # (lease живёт lease_timeout=300с без heartbeat). 3 было бы мало — массовый
  # рестарт >3 разных порт-сервисов одним агентом за 5 мин блокировал бы
  # systemctl (fail-closed). 30 — потолок против runaway, не мешающий
  # штатному обслуживанию; дедуп всё равно не даёт занять чужой порт.
  max_ports: 30
  # max_timers поднят до 50: при shim auto-регистрации таймеров (Уровень 1-Г)
  # квота считает число различных таймеров, перезапущенных в окне lease_timeout
  # (300с). 5 было бы мало — рестарт 6-го разного таймера за 5 мин блокировал бы
  # systemctl (fail-closed). 50 — разумный потолок против runaway, не мешающий
  # штатному обслуживанию.
  max_timers: 50

# -----------------------------------------------------------------------------
# Резерв (шаг 4 PDP): порты, которые ни один агент не может занять.
#   block_privileged_below — всё ниже этого порта (привилегированные <1024).
#   blocked_ports — конкретные зарезервированные порты лаборатории:
#     5432  — PostgreSQL
#     8086  — mcp-apikeys (в пуле Ворона, поэтому явно блокируем)
#     8087  — mcp-memory (в пуле Ворона)
#     9100  — node_exporter
#     9187  — postgres_exporter (в пуле Штрейкбрехера)
# -----------------------------------------------------------------------------
reserve:
  block_privileged_below: 1024
  #   --- добавлены легитимные инфра-порты (2026-07-15, raven): 3002 docker-proxy,
  #       8080 nginx reverse-proxy, 8090 hunter, 8099 uvicorn-API. Зарезервированы,
  #       т.к. не heartbeat-ают gatekeeper (lease истёк бы) — это постоянная инфра.
  blocked_ports: [80, 443, 2222, 3000, 3002, 5432, 6379, 8001, 8080, 8086, 8087, 8090, 8099, 8200, 8202, 8300, 8443, 8444, 8445, 8888, 8889, 8899, 9090, 9100, 9187, 9443, 10443, 18789, 36401]
